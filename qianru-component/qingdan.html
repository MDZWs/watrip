<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>清单模板快捷窗口</title>
  <link rel="stylesheet" href="qingdan.css">
  <style>
    body {
      margin: 0;
      padding: 40px;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
  </style>
</head>
<body>
<div class="main">
<div class="card">
  <div class="card-inner">
    <div class="heading">📋 清单模板</div>
    <div class="details">
      <div class="template-list">
        <div class="template-item">
          <span class="tpl-icon">🏖️</span>
          <span class="tpl-name">海边度假</span>
        </div>
        <div class="template-item">
          <span class="tpl-icon">🏔️</span>
          <span class="tpl-name">登山徒步</span>
        </div>
        <div class="template-item">
          <span class="tpl-icon">🏙️</span>
          <span class="tpl-name">城市观光</span>
        </div>
        <div class="template-item">
          <span class="tpl-icon">✈️</span>
          <span class="tpl-name">商务出差</span>
        </div>
        <div class="template-item">
          <span class="tpl-icon">👨‍👩‍👧</span>
          <span class="tpl-name">亲子出行</span>
        </div>
      </div>
    </div>
    <svg class="glasses" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
      <polyline points="14 2 14 8 20 8"></polyline>
      <line x1="16" y1="13" x2="8" y2="13"></line>
      <line x1="16" y1="17" x2="8" y2="17"></line>
      <polyline points="10 9 9 9 8 9"></polyline>
    </svg>
    <div class="price">快速选</div>
    <div class="buttons">
      <button class="btn1">应用模板</button>
      <button class="btn2">自定义</button>
    </div>
  </div>
</div>
</div>
</body>
</html>
